<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Web Design</title>

<style>

/* HEADER */
header{
    background-color: lightblue;
    text-align: center;
    padding: 20px;
}

/* CONTAINER */
.container{
    padding: 20px;
}

/* CARDS GRID */
.cards{
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

/* INDIVIDUAL CARD */
.card{
    background-color: aquamarine;
    border: 8px double rgb(207, 17, 49);
    text-align: center;
    padding: 10px;
    font-weight: bold;
}

/* IMAGE */
img{
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    margin-top: 10px;
}

/* FOOTER */
footer{
    background-color: brown;
    color: white;
    text-align: center;
    padding: 10px;
    margin: 20px;
}

/* TABLET VIEW */
@media (min-width: 768px){
    .cards{
        grid-template-columns: repeat(2, 1fr);
    }
}

/* DESKTOP VIEW */
@media (min-width: 1024px){
    .cards{
        grid-template-columns: repeat(3, 1fr);
    }

    header{
        text-align: left;
        padding: 20px 40px;
    }
}

</style>
</head>

<body>

<header>
    <h1>Responsive Web Design (RWD)</h1>
    <p>Adapting Screen to every device (mobile, laptop, desktop, tablet)</p>
</header>

<main class="container">
    <section class="cards">

        <div class="card">
            Content flows gracefully
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google image">
        </div>

        <div class="card">
            Reach all users easily
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/06/Amazon_2024.svg" alt="Amazon image">
        </div>

        <div class="card">
            User-friendly navigation
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft image">
        </div>

    </section>
</main>

<footer>
    <p>© 2026 Responsive Design Demo</p>
</footer>

</body>
</html>
