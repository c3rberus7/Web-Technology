<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /*transaction:property duration timingfunction delay;*/
    .box{
        background-color: bisque;
        width: 100px;
        height: 100px;
        transform: all 0.5s ease;
        padding: 10xp;
        margin: 10px;
        gap: 20px;
        cursor: pointer;
        animation: rotateBox 5s linear infinite;
    }
    /*.box:hover{
        background-attachment:aquamarine;
        transform: scale(1.2);
    }*/
    .ani{
        background-color: aqua;
        padding: 30px;
        width: 200px;
        height: 200px;
    }
    .circle{
        width: 100px;
        height: 100px;
        background-color: aliceblue;
        border-radius: 50%;
        animation: colorChange 4s infinite;
    }
    @keyframes move {
       0%{background: red;}
         50%{background: rgb(0,255,119);}
         100%{background: blue;}
    }
    @keyframes rotateBox {
        0%{transform: rotate(0deg);}
           100%{transform: rotate(360deg);}
        
    }
    .text{
        font-size: 30px;
        animation: fade 14s infinite alternating;
    }
    @keyframes fade {
        from{
            opacity: 0;
        }
        to{
            opacity: 1;
        }
    }
</style>   
<body>
     <div class="box">Tran1</div>
     <div class="box">Tran2</div>
     <div class="box">Tran3</div>
     <div class="box">Tran4</div>
    <div class="ani">
    <div class="circle"> circle</div>
    </div>
</body>
</html>
