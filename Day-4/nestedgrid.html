<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color: aqua;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
        }

        h1 {
            margin-top: 50px;
        }

        .grid-container {
            background-color: aliceblue;
            display: grid;
            grid-template-rows: auto auto;
            grid-template-columns: repeat(4, 2fr);
            gap: 12px;
            border: 4px dotted red;
            padding: 30px;
        }

        .griditem {
            background-color: aqua;
            border: 4px dotted red;
            padding: 30px;
            text-align: center;
            margin-top: 10px;
        }

        .nested {
            background-color: lightgray;
            border: 2px dashed black;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>CSS GRID Container and Item</h1>
    <h2>Direct child become the grid item</h2>

    <div class="grid-container">
        <div class="griditem">Grid item 1</div>
        <div class="griditem">Grid item 2</div>

        <div class="nested">Nested (Not a grid item)</div>
        <div class="nested">Nested (Not a grid item)</div>

        <div class="griditem">Grid item 3</div>
        <div class="griditem">Grid item 4</div>
    </div>

</body>
</html>
