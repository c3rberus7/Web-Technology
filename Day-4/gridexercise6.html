<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Day 6 - Grid Layout</title>
    <style>
        :root {
            --primary-blue: #73b4ff;
            --border-blue: #a3ccff;
            --bg-light: #f8fbff;
            --text-blue: #007bff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

\        .page-container {
            background-color: white;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border: 1px solid #d1d1d1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
        }

\        .main-header {
            text-align: center;
            color: var(--text-blue);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-transform: capitalize;
        }

\        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #444;
            margin-bottom: 8px;
        }

        .grid-canvas {
            border: 1px solid var(--border-blue);
            padding: 15px;
            min-height: 60px;
            background-color: white;
        }

\        .item {
            background-color: var(--primary-blue);
            color: white;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1px;
            padding: 8px;
            min-height: 30px;
        }

\        .grid-basic {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 2px;
        }

\        .grid-gap {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 15px;
        }

\        .grid-fr {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 8px;
        }

\        .grid-auto {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 8px;
        }

\        .grid-axis {
            display: grid;
            grid-template-columns: repeat(3, 35px);
            gap: 15px;
            margin-bottom: 20px;
        }

        .grid-centered {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            height: 100px;
            align-items: center;
            justify-items: center;
        }

        .small-box { width: 35px; }

    </style>
</head>
<body>

    <div class="page-container">
        <div class="main-header">CSS Day 6 – Grid Layout</div>

        <div class="section">
            <div class="section-title">Grid Container & Items</div>
            <div class="grid-canvas grid-basic">
                <div class="item">1</div><div class="item">2</div><div class="item">3</div>
                <div class="item">4</div><div class="item">5</div><div class="item">6</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Grid Gap</div>
            <div class="grid-canvas grid-gap">
                <div class="item">A</div><div class="item">B</div><div class="item">C</div>
                <div class="item">D</div><div class="item">E</div><div class="item">F</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Grid Sizing</div>
            <div style="font-size: 10px; color: #666; margin-bottom: 5px;">Fraction Units (fr)</div>
            <div class="grid-canvas grid-fr">
                <div class="item">1fr</div>
                <div class="item">2fr</div>
                <div class="item">1fr</div>
            </div>
            
            <div style="font-size: 10px; color: #666; margin: 10px 0 5px 0;">Auto Columns</div>
            <div class="grid-canvas grid-auto">
                <div class="item">Auto</div>
                <div class="item">Auto</div>
                <div class="item">Auto</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Grid Axis & Alignment</div>
            <div class="grid-canvas grid-axis">
                <div class="item">X</div>
                <div class="item">Y</div>
                <div class="item">Z</div>
            </div>
            
            <div class="grid-canvas grid-centered">
                <div class="item small-box">1</div>
                <div class="item small-box">2</div>
                <div class="item small-box">3</div>
            </div>
        </div>
    </div>

</body>
</html>
