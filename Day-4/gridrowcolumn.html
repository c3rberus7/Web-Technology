<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
     body {
            background-color: aqua;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
        }

        h1 {
            margin-top: 50px;
        }

        .grid-container {
            background-color: aliceblue;
            display: grid;
            grid-template-columns: 1fr 200px 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            gap: 15px;
            border: 4px dotted red;
            padding: 20px;
        }

        .item {
            background-color: aqua;
            border: 4px dotted red;
            padding: 30px;
            text-align: center;
            margin-top: 10px;
        }
        .header{
            grid-column: 1/-1;
        }
        .sidebar{
            background-color: beige;
                grid-row: 2/4;
        
        }
        .content{
            background-color: blueviolet;
            grid-column: 2/5;
            grid-row: 2/4;
        }
        .exit{
            background-color: aquamarine;
            grid-row: 4/-1;
            grid-column: 1/5;
        }
</style>
<body>
    <h1>Grid Css row and grid-template-columns</h1>
    <div class="grid-container">
        <div clasS="item header"> Header(enter page)</div>
        <div clasS="item sidebar"> sidebar(200px)</div>
        <div clasS="item exit"> Fotter of session(200px)</div>
        <div clasS="item content"> Explanation of enter text</div>
   </div>
</body>
</html>
