<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
  body{
    background-color: aqua;
    font-family: 'Courier New', Courier, monospace;
    padding: 40px;
  }
  h1{
    margin-top: 50px;
  }
  .flex-container{
    display: flex;
    gap: 40px;
    margin-top: 50px;
    border: 4px dotted red;
    padding: 50px;
  }
  .flexitem{
    flex: 1;
    background-color: aliceblue;
    padding: 30px;
    text-align: center;
  }
  .grid-container{
    background-color: aliceblue;
    display: grid;
    grid-template-rows: auto auto;
    grid-template-columns: 2fr 1fr 3fr 2fr;
    gap:12px;
    border: 4px dotted red;
    padding: 30px;

  }
  .griditem{
    background-color: aqua;
    border: 4px dotted red;
    padding: 30px;
    text-align: center;
  }
</style>

</head>

<body><h1>CSS GRID VS FLEX<h1>
    <h2>CSS(2D)<-LAYOUT</h2>
    <div class="grid-container">
        <div class="griditem">Row1/col1</div>
        <div class="griditem">Row1/col2</div>
        <div class="griditem">Row1/col3</div>
        <div class="griditem">Row1/col4</div>
    </div>
    <h2>FlexBox(1D)<-LAYOUT</h2>
    <div class="flex-container">
        <div class="flexitem">Row1</div>
        <div class="flexitem">Row2</div>
        <div class="flexitem">Row3</div>
        <div class="flexitem">Row4</div>
    </div>
</body>
</html>
