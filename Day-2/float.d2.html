<!DOCTYPE html>
<html>
<head>
    <title>CSS Float</title>

    <style>
        body {
            background-color: #9ad9d5;
            font-family: Arial;
            margin: 20px;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            margin-top: 0;
        }

        .box {
            border: 2px solid #2c7a7b;
            padding: 15px;
            width: 80%;
        }

        img {
            width: 120px;
            float: left;   /* 🔥 Main concept */
            margin-right: 15px;
        }

    </style>
</head>

<body>

    <h2>CSS FLOAT</h2>
    <p>Text wrapping to left or right</p>

    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">

        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Explicabo autem officia ratione quo non repellendus provident vel, quo modi non voluptatibus magnam asperiores assumenda nisi, alias placeat eos aut ab!
        </p>
    </div>

</body>
</html>
