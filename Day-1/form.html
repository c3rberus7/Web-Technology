<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .form-container {
            width: 300px;
            margin: 100px auto;
            text-align: left;
        }
        h2 {
            text-align: center;
        }
        .form-row {
            margin: 10px 0;
        }
        label {
            display: inline-block;
            width: 80px;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>My Form</h2>

    <form>
        <div class="form-row">
            <label>Name</label>
            <input type="text" name="name">
        </div>

        <div class="form-row">
            <label>Age</label>
            <input type="number" name="age">
        </div>

        <div class="form-row">
            <label>Dep</label>
            <input type="text" name="department">
        </div>

        <div class="form-row">
            <label>Gender</label>
            <input type="radio" name="gender" value="male"> M
            <input type="radio" name="gender" value="female"> F
        </div>

        <div class="buttons">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>
</div>

</body>
</html>
