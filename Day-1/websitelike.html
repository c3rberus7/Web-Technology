<!DOCTYPE html>
<html>
<head>
    <title>College Administration</title>

    <style>
        body {
            font-family: Arial;
            background-color: lightblue;
        }

        h1 {
            text-align: center;
            background-color: navy;
            color: white;
            padding: 10px;
        }

        ul {
            background-color: gray;
            padding: 10px;
        }

        ul li {
            display: inline;
            margin-right: 15px;
        }

        ul li a {
            color: white;
            text-decoration: none;
        }

        .box {
            background-color: white;
            margin: 20px;
            padding: 10px;
            border: 1px solid black;
        }

        footer {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Jerusalem College Admin</h1>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Students</a></li>
        <li><a href="#">Staff</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <div class="box">
        <h2>Students</h2>
        <p>Manage student details here.</p>
    </div>

    <div class="box">
        <h2>Staff</h2>
        <p>Manage staff details here.</p>
    </div>

    <div class="box">
        <h2>Departments</h2>
        <p>View department information.</p>
    </div>

</body>
</html>
