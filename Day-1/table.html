<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Student Details</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Ashwin</td>
            <td>Computer Science</td>
            <td>18</td>
        </tr>
        <tr>
            <td>Meena</td>
            <td>Biotechnology</td>
            <td>19</td>
        </tr>
        <tr>
            <td>Karthik</td>
            <td>Mechanical</td>
            <td>20</td>
        </tr>
    </table>

</body>
</html>
