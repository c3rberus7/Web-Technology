<!DOCTYPE html>
<html>
<head>
    <title>Float & Clear</title>

    <style>
        body {
            font-family: Arial;
        }

        .box {
            border: 2px solid black;
            padding: 10px;
            width: 80%;
        }

        .left {
            float: left;
            width: 100px;
            height: 100px;
            background-color: lightblue;
            margin-right: 10px;
        }

        .right {
            float: right;
            width: 100px;
            height: 100px;
            background-color: lightgreen;
            margin-left: 10px;
        }

        .clear {
            clear: both;   /* 🔥 important */
            background-color: lightcoral;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h2>Float and Clear Example</h2>

    <div class="box">

        <div class="left">Left</div>
        <div class="right">Right</div>

        <p>
            This text wraps around the floated elements. The left box floats to the left,
            and the right box floats to the right.
        </p>

        <div class="clear">
            This section is below floats using clear: both
        </div>

    </div>

</body>
</html>
